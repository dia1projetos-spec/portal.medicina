  <style>
    .artigo-page{padding:140px 0 100px;min-height:100vh}
    .artigo-container{max-width:820px;margin:0 auto;padding:0 24px}
    .artigo-back{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gray-mid);text-decoration:none;margin-bottom:40px;transition:color 0.25s}
    .artigo-back:hover{color:var(--lilac)}
    .artigo-cat{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--lilac);display:block;margin-bottom:16px}
    .artigo-title{font-family:var(--font-d);font-size:clamp(1.8rem,4vw,3rem);font-weight:800;line-height:1.15;color:var(--white);margin-bottom:20px}
    .artigo-meta{display:flex;align-items:center;gap:16px;margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid rgba(123,47,190,0.2)}
    .artigo-date{font-size:12px;color:var(--gray-mid)}
    .artigo-cover{width:100%;border-radius:16px;overflow:hidden;margin-bottom:48px;border:1px solid rgba(123,47,190,0.2)}
    .artigo-cover img{width:100%;display:block;max-height:480px;object-fit:cover}
    .artigo-body{font-family:var(--font-b);font-size:16px;color:rgba(255,255,255,0.85);line-height:1.85}
    .artigo-body h2{font-family:var(--font-d);font-size:1.5rem;font-weight:800;color:var(--lilac);margin:40px 0 16px}
    .artigo-body h3{font-family:var(--font-d);font-size:1.2rem;font-weight:700;color:var(--white);margin:28px 0 12px}
    .artigo-body p{margin-bottom:20px}
    .artigo-body img{max-width:100%;border-radius:12px;margin:16px 0;border:1px solid rgba(123,47,190,0.2)}
    .artigo-body ul,
    .artigo-body ol{padding-left:24px;margin-bottom:20px}
    .artigo-body li{margin-bottom:8px}
    .artigo-body a{color:var(--lilac);text-decoration:underline}
    .artigo-body strong{color:var(--white)}
    .artigo-loading{text-align:center;padding:80px 20px;color:var(--lilac);font-size:16px}
    .share-section{margin-top:60px;padding-top:40px;border-top:1px solid rgba(123,47,190,0.2);text-align:center}
    .share-title{font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gray-mid);margin-bottom:20px}
    .share-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
    .share-btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:8px;font-family:var(--font-d);font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.25s;text-decoration:none;border:1px solid}
    .share-wa{background:rgba(37,211,102,0.1);border-color:rgba(37,211,102,0.3);color:#25D366}
    .share-wa:hover{background:rgba(37,211,102,0.2)}
    .share-copy{background:rgba(123,47,190,0.1);border-color:rgba(123,47,190,0.3);color:var(--lilac)}
    .share-copy:hover{background:rgba(123,47,190,0.2)}
  </style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app = initializeApp({ apiKey:"AIzaSyCqzdQNpZi27nsnmD1XAP-9hXcJiHqVzOM",authDomain:"medicinaargv.firebaseapp.com",projectId:"medicinaargv",storageBucket:"medicinaargv.firebasestorage.app",messagingSenderId:"443649777294",appId:"1:443649777294:web:d44592a81fbf091cb5f3df" });
  const db = getFirestore(app);

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');

  if (!id) { window.location.href = 'blog.html'; }

  async function loadArtigo() {
    try {
      const snap = await getDoc(doc(db, 'artigos', id));
      if (!snap.exists()) { window.location.href = 'blog.html'; return; }
      const a = snap.data();

      // SEO dinâmico
      document.getElementById('pageTitle').textContent     = (a.seoTitle || a.title) + ' — MedicinaARG';
      document.getElementById('pageDesc').content          = a.seoDesc || a.summary || '';
      document.getElementById('pageKeywords').content      = a.seoKeywords || '';
      document.getElementById('ogTitle').content           = a.seoTitle || a.title;
      document.getElementById('ogDesc').content            = a.seoDesc || a.summary || '';
      document.getElementById('ogImage').content           = a.cover || '';
      document.getElementById('ogUrl').content             = window.location.href;
      document.getElementById('twTitle').content           = a.seoTitle || a.title;
      document.getElementById('twDesc').content            = a.seoDesc || a.summary || '';
      document.getElementById('twImage').content           = a.cover || '';

      // Schema.org JSON-LD
      const schema = { "@context":"https://schema.org","@type":"Article","headline":a.title,"description":a.summary||'',
        "image":a.cover||'',"datePublished":a.date||'', "publisher":{"@type":"Organization","name":"MedicinaARG","url":"https://portal-medicina.vercel.app"} };
      const s = document.createElement('script'); s.type='application/ld+json'; s.textContent=JSON.stringify(schema);
      document.head.appendChild(s);

      // Render artigo
      document.getElementById('artigoContent').innerHTML = `
        <span class="artigo-cat">${a.category||'Geral'}</span>
        <h1 class="artigo-title">${a.title}</h1>
        <div class="artigo-meta">
          <span class="artigo-date">📅 ${a.date||''}</span>
          <span class="artigo-date">🏷️ ${a.category||''}</span>
        </div>
        ${a.cover ? `<div class="artigo-cover"><img src="${a.cover}" alt="${a.title}" loading="lazy"></div>` : ''}
        <div class="artigo-body">${a.content||''}</div>
        <div class="share-section">
          <p class="share-title">Gostou? Compartilhe!</p>
          <div class="share-btns">
            <a class="share-btn share-wa" href="https://wa.me/?text=${encodeURIComponent(a.title+' — '+window.location.href)}" target="_blank">📲 WhatsApp</a>
            <button class="share-btn share-copy" onclick="navigator.clipboard.writeText(window.location.href).then(()=>this.textContent='✅ Copiado!')">🔗 Copiar link</button>
          </div>
        </div>`;
    } catch(e) {
      document.getElementById('artigoContent').innerHTML = '<div class="artigo-loading" style="color:#e74c3c">Erro ao carregar artigo.</div>';
    }
  }

  loadArtigo();

  const dot=document.querySelector('.cursor-dot'), ring=document.querySelector('.cursor-ring');
  if(dot&&ring&&window.matchMedia('(pointer:fine)').matches){let mx=0,my=0,rx=0,ry=0;document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.left=mx+'px';dot.style.top=my+'px'});(function a(){rx+=(mx-rx)*0.12;ry+=(my-ry)*0.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(a)})()}
</script>
